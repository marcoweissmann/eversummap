name: Update sales data

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - run: pip install pdfplumber requests

    - run: python scripts/update_sales.py

    - name: Commit updated GeoJSON
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add data/haeuser_final.geojson
        git commit -m "update sales data" || echo "no changes"
        git push
