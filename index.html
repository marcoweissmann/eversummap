<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Waldferiendorf Eversum – Häuser</title>

<link rel="icon" href="favicon.svg" sizes="any" type="image/svg+xml">
  
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
}

#map{
  height:100vh;
  width:100%;
}

.panel{
  background:white;
  padding:12px;
  border-radius:6px;
  box-shadow:0 0 8px rgba(0,0,0,0.3);
  font-family:sans-serif;
  font-size:13px;
  max-width:260px;
}

.legend-item{
  display:flex;
  align-items:center;
  margin-bottom:5px;
}

.legend-color{
  width:14px;
  height:14px;
  margin-right:6px;
  border:1px solid #444;
}

.sales-table{
  border-collapse:collapse;
  width:100%;
  margin-top:6px;
}

.sales-table th{
  text-align:left;
  border-bottom:1px solid #ddd;
  padding:4px;
}

.sales-table td{
  padding:4px;
}

.sales-table tr:hover{
  background:#f3f3f3;
}

.sales-table button{
  font-size:12px;
  padding:2px 6px;
  cursor:pointer;
}

.price-history{
  margin-top:6px;
}

.price-history svg{
  display:block;
}

.price-delta{
  font-size:12px;
  margin-top:2px;
}

.price-delta.down{ color:#1a7f37; }   /* gefallen = gut für Käufer */
.price-delta.up{ color:#b42318; }      /* gestiegen */
.price-delta.flat{ color:#666; }

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map('map').setView([51.702721,7.332047],6);

L.tileLayer(
 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
 { attribution:'© OpenStreetMap contributors'}
).addTo(map);

map.attributionControl.addAttribution(
'Verkaufsdaten: <a href="https://www.waldferiendorf-eversum.de" target="_blank">waldferiendorf-eversum.de</a>'
);

let geoLayer;
let salesFeatures=[];
let priceHistory={};


// Datum kurz: "06/2026"
function formatMonth(iso){
 const d=new Date(iso);
 return String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}


// SVG-Sparkline aus den Historien-Punkten eines Hauses
function buildSparkline(punkte){
 const pts=(punkte||[]).filter(p=>p.preis!=null);
 if(pts.length<2) return "";

 const W=220, H=46, pad=4;
 const values=pts.map(p=>p.preis);
 const min=Math.min(...values);
 const max=Math.max(...values);
 const span=(max-min)||1;

 const x=i=> pad + (W-2*pad) * (i/(pts.length-1));
 const y=v=> pad + (H-2*pad) * (1-(v-min)/span);

 const line=pts.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.preis).toFixed(1)}`).join(" ");
 const last=pts[pts.length-1];

 return `
 <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
   <path d="${line}" fill="none" stroke="#1f78b4" stroke-width="2"/>
   <circle cx="${x(pts.length-1).toFixed(1)}" cy="${y(last.preis).toFixed(1)}" r="3" fill="#1f78b4"/>
 </svg>`;
}


// Text zur Preisänderung seit dem ersten erfassten Punkt
function priceDeltaHtml(punkte){
 const pts=(punkte||[]).filter(p=>p.preis!=null);
 if(pts.length<2) return "";

 const first=pts[0], last=pts[pts.length-1];
 const diff=last.preis-first.preis;

 const cls=diff<0?"down":diff>0?"up":"flat";
 const sign=diff>0?"+":diff<0?"−":"±";
 const arrow=diff<0?"▼":diff>0?"▲":"→";

 return `<div class="price-delta ${cls}">${arrow} ${sign}${formatPrice(Math.abs(diff))} seit ${formatMonth(first.datum)}</div>`;
}


// Preisformatierung
function formatPrice(value){
 if(!value) return "-";
 return new Intl.NumberFormat('de-DE').format(value)+ "\u00A0" + "€";
}



// GeoJSON + Preis-Historie laden
// Historie ist optional: fällt sie weg, funktioniert die Karte trotzdem.
Promise.all([
 fetch('data/haeuser_final.geojson').then(r=>r.json()),
 fetch('data/preis_historie.json').then(r=>r.ok?r.json():{}).catch(()=>({}))
])
.then(([data,history])=>{

priceHistory=history||{};

geoLayer=L.geoJSON(data,{

style:function(feature){

 const status=feature.properties?.status;

 const fill=status==="zu_verkaufen"
   ? "#1f78b4"      // blau
   : "#cfcfcf";     // grau

 const opacity=status==="zu_verkaufen"
   ? 0.85
   : 0.4;

 return{
   color:"#444",
   weight:1,
   fillColor:fill,
   fillOpacity:opacity
 };

},

onEachFeature:function(feature,layer){

 const p=feature.properties;

 const hist=priceHistory[p.id] || priceHistory[p["@id"]];
 const punkte=hist?.punkte;

 const histHtml=(punkte && punkte.length>1)
   ? `<div class="price-history">${buildSparkline(punkte)}${priceDeltaHtml(punkte)}</div>`
   : "";

 const popup=`
   <b>${p["addr:street"] ?? ""} ${p["addr:housenumber"] ?? ""}</b><br>
   Status: ${p.status ?? "-"}<br>
   Preis: ${formatPrice(p.preis)}<br>
   Pacht: ${p.pacht ?? "-"} € / Jahr<br>
   Fläche: ${p.flaeche ?? "-"} m²
   ${histHtml}
 `;

 layer.bindPopup(popup);


 // Hover Highlight
 layer.on("mouseover",function(){
   layer.setStyle({
     weight:3,
     color:"#000"
   });
 });

 layer.on("mouseout",function(){
   geoLayer.resetStyle(layer);
 });


 // Verkaufsobjekte sammeln
 if(p.status==="zu_verkaufen"){
   salesFeatures.push({feature,layer});
 }

}

}).addTo(map);


map.fitBounds(geoLayer.getBounds());

createSalesPanel();

});




// Panel (Legende + Verkaufstabelle)
function createSalesPanel(){

salesFeatures.sort((a,b)=>{
 return (a.feature.properties.preis||0)-(b.feature.properties.preis||0);
});


const control=L.control({position:"bottomleft"});

control.onAdd=function(){

const div=L.DomUtil.create("div","panel");

let html=`

<b>Status</b>

<div class="legend-item">
<div class="legend-color" style="background:#1f78b4"></div>
zu verkaufen
</div>

<div class="legend-item">
<div class="legend-color" style="background:#cfcfcf"></div>
nicht zu verkaufen
</div>

<hr>

<b>Verfügbare Häuser</b>

<table class="sales-table">

<tr>
<th>Adresse</th>
<th>Preis</th>
<th>Fläche</th>
<th></th>
</tr>
`;


salesFeatures.forEach((obj,i)=>{

const p=obj.feature.properties;

html+=`
<tr>
<td>${p["addr:street"]} ${p["addr:housenumber"]}</td>
<td>${formatPrice(p.preis)}</td>
<td>${p.flaeche ?? "-"} m²</td>
<td><button onclick="zoomToHouse(${i})">Karte</button></td>
</tr>
`;

});


html+=`</table>`;

html+=`<hr><a href="historie.html">Preis-Historie ansehen →</a>`;

div.innerHTML=html;

L.DomEvent.disableClickPropagation(div);

return div;

};

control.addTo(map);

}



// Zoom auf Gebäude
function zoomToHouse(index) {
    const obj = salesFeatures[index];
    
    // Mittelpunkt des Objekts berechnen
    let center;
    if (obj.layer.getLatLng) {
        // Falls es ein Marker (Pin) ist
        center = obj.layer.getLatLng();
    } else if (obj.layer.getBounds) {
        // Falls es ein Polygon, Rechteck etc. ist
        center = obj.layer.getBounds().getCenter();
    }

    // Karte fliegt zur Mitte des Objekts und zoomt auf Level 18
    map.flyTo(center);

    // Popup leicht verzögert öffnen, damit es nicht während der Animation 
    // an der alten Position aufploppt (optional, aber sieht besser aus)
    setTimeout(() => {
        obj.layer.openPopup();
    }, 300); // 400ms passen meist gut zur flyTo-Standarddauer

}

</script>

</body>
</html>
